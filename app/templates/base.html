<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Finances{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="{{ url_for('index') }}">Finances</a></div>
    <nav>
      <a href="{{ url_for('index') }}">Summary</a>
      <a href="{{ url_for('transactions') }}">Transactions</a>
      <a href="{{ url_for('rules_index') }}">Rules</a>
      <a href="{{ url_for('import_form') }}">Import</a>
      <a href="{{ url_for('settings') }}">Settings</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul class="flash">
        {% for category, message in messages %}
          <li class="flash-{{ category }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
